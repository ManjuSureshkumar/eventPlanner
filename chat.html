<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Parisienne&family=Passero+One&display=swap" rel="stylesheet">

<title>LiveChat</title>

<style>

/* PAGE */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
}

.chat-page {
  background: #FDFDF8;
  min-height: 100vh;
}

/* HEADER */
.chat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
}

/* WHATSAPP BUTTON */
.whatsapp-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #069506;
  color: white;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
}

.whatsapp-btn img {
  width: 20px;
}

/* NAV */
.nav-links {
  display: flex;
  gap: 30px;
}

.nav-links a {
  text-decoration: none;
  color: black;
  font-weight: 600;
}

/* DOWNLOAD */
.download-btn {
  background: #319F43;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  font-weight: 600;
  cursor: pointer;
}

/* CENTER SECTION */
.chat-center {
  display: flex;
  flex-direction: column;
  align-items: center;   /* 🔥 CENTER EVERYTHING */
  justify-content: center;
  margin-top: 120px;
}

/* LOGO */
.logo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}

/* "One" */
.one-text {
  font-family: 'Parisienne', cursive;
  font-size: 100px;
  line-height: 110px;

  background: linear-gradient(
    133deg,
    #2AEFEF,
    #D300A5,
    #E21717
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* "Event" */
.event-text {
  font-family: 'Passero One', sans-serif;
  font-size: 60px;
  margin-top: -20px; /* slight overlap like design */
}

/* BUTTON */
.chat-btn {
  background: #319F43;
  color: white;
  border: none;
  padding: 15px 40px;
  border-radius: 25px;
  font-size: 18px;
  margin: 20px 0;
  cursor: pointer;
}

/* TEXT */
.small-text {
  margin-top: 20px;
}

.download-link {
  color: #1CA3F7;
  text-decoration: none;
}

</style>
</head>

<body>

<section class="chat-page">

  <!-- HEADER -->
  <div class="chat-header">
    <button class="whatsapp-btn">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
      WhatsApp
    </button>

    <div class="nav-links">
      <a href="#">Features</a>
      <a href="#">Privacy</a>
      <a href="#">Help Center</a>
      <a href="#">Blog</a>
      <a href="#">For Business</a>
      <a href="#">Apps</a>
    </div>

    <button class="download-btn">Download</button>
  </div>

  <!-- CENTER -->
  <div class="chat-center">

    <!-- LOGO -->
    <div class="logo-container">
      <div class="one-text">One</div>
      <div class="event-text">Event</div>
    </div>

    <!-- BUTTON -->
    <a href="#" class="chat-btn">Continue With Chat</a>

    <!-- TEXT -->
    <p class="small-text">Don’t have WhatsApp yet?</p>
    <a href="#" class="download-link">Download</a>

  </div>

</section>

</body>
</html>
